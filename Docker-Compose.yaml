version: '3.8'

services:

  # ─── Backend ───────────────────────────────
  backend:
    image: node:18-alpine
    working_dir: /app
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: sh -c "npm install && node server.js"
    ports:
      - "4000:4000"
    env_file:
      - ./backend/.env
    networks:
      - tomato-network

  # ─── Frontend ──────────────────────────────
  frontend:
    image: node:18-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - tomato-network

  # ─── Admin ─────────────────────────────────
  admin:
    image: node:18-alpine
    working_dir: /app
    volumes:
      - ./admin:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "5174:5174"
    depends_on:
      - backend
    networks:
      - tomato-network

  # ─── MongoDB ───────────────────────────────
  mongodb:
    image: mongo:6
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - tomato-network

networks:
  tomato-network:
    driver: bridge

volumes:
  mongo-data: